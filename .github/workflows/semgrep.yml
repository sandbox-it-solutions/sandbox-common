name: Semgrep SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 7 * * 1'  # Weekly Monday 7 AM UTC

permissions:
  contents: read

jobs:
  semgrep:
    name: 🛡️ Semgrep Security Scan
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep scan \
            --config "p/default" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --error \
            --verbose \
            --json --json-output=semgrep-results.json \
            .

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30
